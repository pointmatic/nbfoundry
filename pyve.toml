pyve_schema = "3.0"

[project]
name = "nbfoundry"

# Light: nbfoundry itself + its runtime deps. No ML stack.
[env.root]
purpose = "utility"
backend = "venv"                              # nbfoundry is light; conda is overkill

# Light: routine CI tests, ruff, mypy, pytest. Default for every `pyve test`.
[env.testenv]
purpose = "test"
backend = "venv"
default = true
requirements = ["requirements-dev.txt"]

# Focused, lazy: hardware smokes split on the ONE hard constraint — torch-MPS and
# TF-Metal cannot co-reside in a process (F.f.1 SIGBUS). Two families, two envs. venv —
# every dep is a macOS arm64 pip wheel, decoupled from the conda bundled-payload manifest.
[env.smoke-torch]
purpose = "test"
backend = "venv"
requirements = ["tests/integration/env/torch.txt"]   # torch + HF (transformers/datasets/peft) + optuna + numpy + pytest
lazy = true                                           # serves F.d PyTorch, F.f HuggingFace, F.g Optuna (all torch-family)

[env.smoke-tensorflow]
purpose = "test"
backend = "venv"
requirements = ["tests/integration/env/tensorflow.txt"]   # tf-macos + tf-metal + numpy + pytest
lazy = true                                               # serves F.c TF AND F.e Keras (bundled)