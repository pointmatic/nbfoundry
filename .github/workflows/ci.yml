name: CI

on:
  # Branch pushes and PRs only — NOT tag pushes. A bare `push:` fires on every
  # ref (branches AND tags), so pushing a release tag (e.g. `v0.45.0`) re-ran the
  # whole suite on the identical commit that already passed on its branch.
  # Naming `branches:` implicitly excludes tags; `publish.yml` handles tag pushes.
  push:
    branches: ['**']
  pull_request:

# One in-flight run per ref; newer pushes cancel older queued runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned pyve release — keeps CI reproducible (no Homebrew, no version drift).
  # Bump deliberately when adopting a new pyve. Requires >= v3.0.7 (v3.0.6's
  # `self install` omitted lib/ui/ and produced a broken install).
  PYVE_REF: "v3.0.7"
  PYVE_REPO: "https://github.com/pointmatic/pyve"
  # Project Python. pyve's venv backend provisions the interpreter through a
  # version manager (asdf/pyenv), not from PATH — so CI installs pyenv and
  # compiles THIS exact version. `pyve init --python-version` then finds it
  # already installed and uses it, instead of prompting to install pyve's
  # default (3.14.x) and aborting on the non-TTY decline.
  PYTHON_VERSION: "3.12.13"
  # `pyve init` is an interactive wizard; on a runner (no TTY) it must not prompt.
  PYVE_INIT_NONINTERACTIVE: "1"

jobs:
  lint-test:
    name: lint + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # ubuntu is the "stretch" leg (QR-3): it runs but does not block the build.
    continue-on-error: ${{ !matrix.primary }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon — primary target
            primary: true
          - os: ubuntu-latest # Linux — stretch
            primary: false

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      # pyve's venv backend builds the venv from a version-manager-provisioned
      # interpreter, so CI provides Python via pyenv (not setup-python). The
      # compiled CPython is cached; subsequent runs skip the ~1–3 min build.
      - name: Cache pyenv (compiled Python)
        uses: actions/cache@v4
        with:
          path: ~/.pyenv
          key: pyenv-${{ matrix.os }}-py${{ env.PYTHON_VERSION }}

      - name: Install pyenv + project Python
        run: |
          if [ ! -x "$HOME/.pyenv/bin/pyenv" ]; then
            if [ "$RUNNER_OS" = "Linux" ]; then
              # CPython build dependencies for pyenv's python-build.
              sudo apt-get update
              sudo apt-get install -y make build-essential libssl-dev zlib1g-dev \
                libbz2-dev libreadline-dev libsqlite3-dev libncursesw5-dev xz-utils \
                tk-dev libxml2-dev libxmlsec1-dev libffi-dev liblzma-dev
            fi
            curl -fsSL https://pyenv.run | bash
          fi
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          pyenv install -s "$PYTHON_VERSION"   # -s: skip if already present (cache hit)
          pyenv global "$PYTHON_VERSION"
          # Expose pyenv (command + shims) to every later step.
          echo "PYENV_ROOT=$PYENV_ROOT" >> "$GITHUB_ENV"
          echo "$PYENV_ROOT/bin" >> "$GITHUB_PATH"
          echo "$PYENV_ROOT/shims" >> "$GITHUB_PATH"

      # Single idiom: CI runs the same `pyve` commands as local dev. pyve is a
      # bash tool distributed via a Homebrew tap; in CI we bypass Homebrew by
      # cloning the pinned release and self-installing it to ~/.local/bin. The
      # repo entry point is `pyve.sh` at the root (the `bin/pyve` wrapper exists
      # only in the Homebrew layout). (If pointmatic/pyve is private, add a token.)
      - name: Install pyve
        run: |
          git clone --depth 1 --branch "$PYVE_REF" "$PYVE_REPO" "$RUNNER_TEMP/pyve"
          "$RUNNER_TEMP/pyve/pyve.sh" self install
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show versions
        run: |
          pyve --version
          pyenv version
          python --version

      # Reuse the materialized environments across runs — both the main runtime
      # venv (.venv) and the pyve testenv (.pyve). They MUST be cached together:
      # caching only .pyve leaves a warm cache "initialized but with no main
      # venv", which is exactly the state that makes `pyve init` prompt below.
      # Invalidated when the interpreter, the pinned pyve, or any dependency / env
      # manifest changes.
      - name: Cache pyve environments
        uses: actions/cache@v4
        with:
          path: |
            .venv
            .pyve
          key: pyve-${{ matrix.os }}-${{ env.PYVE_REF }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements-dev.txt', 'pyproject.toml', 'pyve.toml') }}

      - name: Bootstrap project + dev environment
        run: |
          # On a warm cache, `.pyve` and `.venv` are restored together and a bare
          # `pyve init` would detect the existing init and open an interactive
          # "Update / Purge / Cancel" menu — with no TTY on the runner it reads
          # empty input and exits 1 (PYVE_INIT_NONINTERACTIVE does not cover this
          # branch). So initialize only on a cold cache; reuse the materialized
          # envs on a warm one. The editable installs are idempotent and always
          # run so the envs track the checked-out source.
          if [ ! -d .pyve ]; then
            pyve init --backend venv --python-version "$PYTHON_VERSION" --no-project-guide --no-direnv
            pyve env init
          fi
          pyve run pip install -e .
          pyve env run pip install -e .
          pyve env install -r requirements-dev.txt

      - name: Lint (ruff)
        run: pyve env run ruff check .

      - name: Format check (ruff)
        run: pyve env run ruff format --check .

      - name: Type check (mypy --strict)
        run: pyve env run mypy

      - name: Test suite (+ coverage gate)
        run: pyve test

      # Upload coverage from the primary (macOS) leg only — single source of
      # truth, no double-counting from the stretch leg. Works tokenless on a
      # public repo; add a CODECOV_TOKEN secret for reliable, rate-limit-free
      # uploads. Never fails the build on an upload hiccup (coverage reporting
      # must not gate CI).
      - name: Upload coverage to Codecov
        if: ${{ matrix.primary }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
