# Rejection: submission field `name` values must be unique; `answer` repeats.
title: Duplicate field name exercise
description: Two submission fields share a name.
sections:
  - title: Step one
    description: Do the thing.
    code: |
      print("hello")
submission:
  pass_threshold: 0.5
  fields:
    - name: answer
      type: number
      label: First answer
      expected:
        type: equals
        value: 1
    - name: answer
      type: number
      label: Second answer
      expected:
        type: equals
        value: 2
